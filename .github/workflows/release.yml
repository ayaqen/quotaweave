name: Publish GitHub Package

on:
  release:
    types: [published]
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@ayaqen"
          cache: npm
      - run: npm ci
      - run: npm run check
      - name: Verify release tag
        if: github.event_name == 'release'
        run: node -e "const p=require('./package.json');if(process.env.GITHUB_REF_NAME!=='v'+p.version)throw new Error('Release tag must be v'+p.version)"
      - name: Publish version if missing
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@ayaqen/quotaweave@$VERSION" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "@ayaqen/quotaweave@$VERSION is already published"
          else
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
